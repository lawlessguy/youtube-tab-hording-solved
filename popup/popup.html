<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat">
        <span class="stat-val" id="yt-tabs">0</span>
        <span class="stat-label">Tabs</span>
      </div>
      <div class="stat clickable" id="remove-duplicates">
        <span class="stat-val" id="duplicate-tabs">0</span>
        <span class="stat-label">Dupes
          <svg class="stat-trash" viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2V6"/></svg>
        </span>
      </div>
      <div class="stat clickable" id="close-shorts">
        <span class="stat-val" id="shorts-tabs">0</span>
        <span class="stat-label">Shorts
          <svg class="stat-trash" viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2V6"/></svg>
        </span>
      </div>
    </div>

    <div class="control-section">
      <div class="control-header">
        <span class="control-label">Volume</span>
        <select id="volume-scope" class="scope-select">
          <option value="tab">Current Tab</option>
          <option value="window">This Window</option>
          <option value="all">All Windows</option>
        </select>
      </div>
      <div class="slider-row">
        <svg class="slider-icon clickable" id="volume-reset" title="Reset to 100%" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07,4.93a10,10,0,0,1,0,14.14M15.54,8.46a5,5,0,0,1,0,7.07"/></svg>
        <input type="range" id="volume-slider" min="0" max="1000" value="100" step="10" class="slider">
        <span class="slider-value" id="volume-value">100%</span>
      </div>
    </div>

    <div class="control-section">
      <div class="control-header">
        <span class="control-label">Speed</span>
        <select id="speed-scope" class="scope-select">
          <option value="tab">Current Tab</option>
          <option value="window">This Window</option>
          <option value="all">All Windows</option>
        </select>
      </div>
      <div class="slider-row">
        <svg class="slider-icon clickable" id="speed-reset" title="Reset to 1.0x" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        <input type="range" id="speed-slider" min="0" max="100" value="10" class="slider">
        <span class="slider-value" id="speed-value">1.0x</span>
      </div>
    </div>

    <button class="btn-primary" id="open-sidepanel">
      Open Side Panel
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
